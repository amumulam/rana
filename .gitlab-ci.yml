variables:
  GIT_DEPTH: 0

stages:
  - test
  - release
  - deploy

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

pytest:
  stage: test
  image: python:3.9-slim
  before_script:
    - pip install pdfplumber pytest
  script:
    - python3 -m pytest tests/ -v

auto-release:
  stage: release
  image: alpine:latest
  needs: [pytest]
  rules:
    - if: $CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-(rc|alpha|beta)\d+)?[a-z]?$/
  before_script:
    - apk add --no-cache git zip curl
    - git fetch --tags
  script:
    - mkdir -p /tmp/rana-release
    - git archive $CI_COMMIT_TAG rana/ | tar -x -C /tmp/rana-release
    - cd /tmp/rana-release/rana && zip -r /tmp/rana-${CI_COMMIT_TAG}.zip .
    - PACKAGE_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/rana/${CI_COMMIT_TAG}/rana-${CI_COMMIT_TAG}.zip"
    - 'curl --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file /tmp/rana-${CI_COMMIT_TAG}.zip "$PACKAGE_URL"'
    - CHANGELOG=$(sh scripts/generate-changelog.sh $CI_COMMIT_TAG)
    - 'curl --header "JOB-TOKEN: $CI_JOB_TOKEN" --header "Content-Type: application/json" --data "{\"tag_name\":\"$CI_COMMIT_TAG\",\"name\":\"rana $CI_COMMIT_TAG\",\"description\":\"$CHANGELOG\",\"assets\":{\"links\":[{\"name\":\"rana-${CI_COMMIT_TAG}.zip\",\"url\":\"${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/rana/${CI_COMMIT_TAG}/rana-${CI_COMMIT_TAG}.zip\",\"link_type\":\"package\"}]}}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"'

notify-mattermost:
  stage: deploy
  image: alpine:latest
  needs: [auto-release]
  rules:
    - if: $CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-(rc|alpha|beta)\d+)?[a-z]?$/
  before_script:
    - apk add --no-cache curl git
    - git fetch --tags
  script:
    - CHANGELOG=$(sh scripts/generate-changelog.sh $CI_COMMIT_TAG)
    - 'curl -X POST -H "Content-Type: application/json" -d "{\"text\":\"rana $CI_COMMIT_TAG released!\n\n$CHANGELOG\n\nRelease: ${CI_PROJECT_URL}/-/releases/$CI_COMMIT_TAG\"}" "$MATTERMOST_WEBHOOK_URL"'

sync-skill:
  stage: deploy
  image: alpine:latest
  needs: [auto-release]
  rules:
    - if: $CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-(rc|alpha|beta)\d+)?[a-z]?$/ && $SYNC_SKILL == "true"
  before_script:
    - apk add --no-cache rsync
  script:
    - rsync -av --delete --exclude='.git' rana/ /skills-local/rana/
    - rsync -av --delete --exclude='.git' rana/ /skills-server/rana/

sync-wiki:
  stage: deploy
  image: alpine:latest
  rules:
  - changes:
    - wiki/**
  before_script:
  - apk add --no-cache git openssh-client rsync
  - eval $(ssh-agent -s)
  - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
  - mkdir -p ~/.ssh
  - ssh-keyscan gitlab.vmic.xyz >> ~/.ssh/known_hosts 2>/dev/null
  - git config --global user.email "wiki-bot@gitlab.vmic.xyz"
  - git config --global user.name "Wiki Bot"
  script:
  - bash scripts/sync-wiki.sh wiki