stages:
  - test
  - release
  - deploy

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

pytest:
  stage: test
  image: python:3.9-slim
  before_script:
    - pip install --timeout=120 --retries=5 pdfplumber pytest
  script:
    - python3 -m pytest tests/ -v

auto-release:
  stage: release
  image: alpine:latest
  needs: [pytest]
  variables:
    GIT_DEPTH: 0
  rules:
    - if: $CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-(rc|alpha|beta)\d+)?[a-z]?$/
  before_script:
    - apk add --no-cache git curl jq
    - git fetch --tags
  script:
    - sh scripts/generate-changelog.sh "$CI_COMMIT_TAG" changelog.txt
    - sh scripts/build-release-payload.sh "$CI_COMMIT_TAG" changelog.txt payload.json
    - 'curl --header "JOB-TOKEN: $CI_JOB_TOKEN" --header "Content-Type: application/json" --data @payload.json "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"'

notify-mattermost:
  stage: deploy
  image: alpine:latest
  needs: [auto-release]
  variables:
    GIT_DEPTH: 0
  rules:
    - if: $CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-(rc|alpha|beta)\d+)?[a-z]?$/
  before_script:
    - apk add --no-cache curl git jq
    - git fetch --tags
  script:
    - sh scripts/generate-changelog.sh "$CI_COMMIT_TAG" changelog.txt
    - sh scripts/build-mattermost-payload.sh "$CI_COMMIT_TAG" changelog.txt "${CI_PROJECT_URL}/-/releases/$CI_COMMIT_TAG" payload.json
    - 'curl -X POST -H "Content-Type: application/json" -d @payload.json "$MATTERMOST_WEBHOOK_URL"'

sync-skill:
  stage: deploy
  image: alpine:latest
  needs: [auto-release]
  rules:
    - if: $CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-(rc|alpha|beta)\d+)?[a-z]?$/ && $SYNC_SKILL == "true"
  before_script:
    - apk add --no-cache rsync
  script:
    - rsync -av --delete --exclude='.git' rana/ /skills-local/rana/
    - rsync -av --delete --exclude='.git' rana/ /skills-server/rana/

sync-wiki:
  stage: deploy
  image: alpine:latest
  needs: []
  rules:
    - changes:
      - wiki/**
  before_script:
    - apk add --no-cache git rsync
    - git config --global user.email "wiki-bot@gitlab.vmic.xyz"
    - git config --global user.name "Wiki Bot"
  script:
    - export WIKI_REPO_URL="https://project_${CI_PROJECT_ID}_bot:${WIKI_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.wiki.git"
    - bash scripts/sync-wiki.sh wiki