stages:
  - test
  - release
  - deploy

sast:
  stage: test
  include:
  - template: Security/SAST.gitlab-ci.yml

auto-release:
  stage: release
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+[a-z]?$/
  before_script:
    - apk add --no-cache git zip curl
  script:
    - mkdir -p /tmp/rana && cd /tmp/rana
    - git archive $CI_COMMIT_TAG rana/ | tar -x -C .
    - cd rana && zip -r /tmp/rana-${CI_COMMIT_TAG}.zip .
    - PACKAGE_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/rana/${CI_COMMIT_TAG}/rana-${CI_COMMIT_TAG}.zip"
    - 'curl --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file /tmp/rana-${CI_COMMIT_TAG}.zip "$PACKAGE_URL"'
  release:
    tag_name: $CI_COMMIT_TAG
    name: rana $CI_COMMIT_TAG
    description: Auto-generated release. See commit history for details.
    assets:
      links:
        - name: rana-${CI_COMMIT_TAG}.zip
          url: ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/rana/${CI_COMMIT_TAG}/rana-${CI_COMMIT_TAG}.zip
          link_type: package

sync-wiki:
  stage: deploy
  image: alpine:latest
  rules:
  - changes:
    - wiki/**
  before_script:
  - apk add --no-cache git openssh-client rsync
  - eval $(ssh-agent -s)
  - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
  - mkdir -p ~/.ssh
  - ssh-keyscan gitlab.vmic.xyz >> ~/.ssh/known_hosts 2>/dev/null
  - git config --global user.email "wiki-bot@gitlab.vmic.xyz"
  - git config --global user.name "Wiki Bot"
  script:
  - bash scripts/sync-wiki.sh wiki